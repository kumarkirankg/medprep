<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MedPrep Prototype</title>
  
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <style>
    :root {
      --font-sans: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      --color-background-primary: #ffffff;
      --color-background-secondary: #f9fafb;
      --color-background-success: #ecfdf5;
      --color-background-danger: #fef2f2;
      --color-background-info: #eff6ff;
      --color-text-primary: #111827;
      --color-text-secondary: #4b5563;
      --color-text-tertiary: #6b7280;
      --color-text-success: #059669;
      --color-text-danger: #dc2626;
      --color-text-info: #2563eb;
      --color-text-warning: #d97706;
      --color-border-secondary: #d1d5db;
      --color-border-tertiary: #e5e7eb;
      --color-border-success: #a7f3d0;
      --color-border-danger: #fecaca;
      --color-border-warning: #fde68a;
      --border-radius-md: 6px;
      --border-radius-lg: 10px;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    function MedPrep() {
      const [query, setQuery] = useState("");
      const [result, setResult] = useState(null);
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState(null);
      const [apiKey, setApiKey] = useState(() => localStorage.getItem("MEDPREP_GEMINI_KEY") || "");

      useEffect(() => { localStorage.setItem("MEDPREP_GEMINI_KEY", apiKey); }, [apiKey]);

      const analyzeQuery = async () => {
        if (!query.trim() || loading) return;
        if (!apiKey.trim()) {
          setError("Please paste a Gemini API Key in the config box below.");
          return;
        }

        setLoading(true);
        setError(null);
        setResult(null);

        try {
          const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${apiKey.trim()}`, {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              contents: [{ role: "user", parts: [{ text: `Patient query: "${query}"` }] }],
              systemInstruction: { parts: [{ text: "Respond ONLY with a JSON object. Keys: priority, urgency_reason, summary_for_clinician, patient_response_script, next_action, key_flags (array), emma_resolves (boolean)." }] },
              generationConfig: { responseMimeType: "application/json" }
            })
          });

          const data = await response.json();
          const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "";
          setResult(JSON.parse(text));
        } catch (err) {
          setError("Analysis failed. Check your API key.");
        } finally {
          setLoading(false);
        }
      };

      return (
        <div style={{ fontFamily: "var(--font-sans)", maxWidth: 660, margin: "2rem auto", padding: "1rem" }}>
          <h1>MedPrep Prototype</h1>
          <input 
            type="password" 
            placeholder="Paste your Gemini API Key here..." 
            value={apiKey} 
            onChange={e => setApiKey(e.target.value)}
            style={{ width: "100%", padding: "10px", marginBottom: "1rem" }}
          />
          <textarea 
            rows="4" 
            value={query} 
            onChange={e => setQuery(e.target.value)} 
            placeholder="Type query here..."
            style={{ width: "100%", padding: "10px" }}
          />
          <button onClick={analyzeQuery} style={{ width: "100%", padding: "10px", marginTop: "10px" }}>
            {loading ? "Analyzing..." : "Analyse and triage"}
          </button>
          {result && <pre style={{ marginTop: "20px", background: "#f4f4f4", padding: "10px" }}>{JSON.stringify(result, null, 2)}</pre>}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<MedPrep />);
  </script>
</body>
</html>
